name: CI & Deploy
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      src:
        description: 'Source ref to build from (default: current branch)'
        required: false
      dst:
        description: 'Dist branch name (default: dist)'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build library
        run: pnpm build

      - name: Build site
        run: pnpm --filter og-crd-site build
        env:
          VITE_CORS_PROXY_URL: ${{ vars.VITE_CORS_PROXY_URL }}

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-dist:
    needs: build
    if: github.ref == 'refs/heads/main'
    uses: runsascoded/npm-dist/.github/workflows/build-dist.yml@v1
    with:
      source_ref: ${{ inputs.src || '' }}
      dist_branch: ${{ inputs.dst || 'dist' }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    uses: runsascoded/pnpm-release/.github/workflows/release.yml@v1
    secrets:
      npm_token: ${{ secrets.NPM_TOKEN }}
